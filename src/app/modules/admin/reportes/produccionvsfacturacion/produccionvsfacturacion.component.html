<div class="flex flex-col flex-auto min-w-0 bg-gray-50">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-2 sm:py-8 sm:px-10 border-b border-gray-200 bg-white shadow-sm">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center font-medium text-sm text-gray-600">
        <div>
          <a class="whitespace-nowrap text-gray-700 hover:text-gray-900">TMS</a>
        </div>
        <div class="flex items-center ml-1 whitespace-nowrap">
          <mat-icon class="fuse-horizontal-navigation-item-icon text-gray-400" [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
          <span class="ml-1 text-gray-500">Reporte</span>
        </div>
      </div>
      <div class="mt-2">
        <h2 class="text-3xl md:text-4xl font-semibold tracking-tight leading-7 sm:leading-10 truncate text-gray-900">
          Producción vs Facturación
        </h2>
      </div>
    </div>
  </div>

  <!-- Contenido Principal -->
  <div class="main-content container-fluid p-2">
    <!-- Filtros de Búsqueda -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-2 overflow-hidden">
      <div class="p-2">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <!-- Año -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Año:</label>
            <p-dropdown
              [options]="anios"
              [(ngModel)]="model.anio"
              placeholder="Seleccione un año"
              class="w-full filter-control-compact"
              [resetFilterOnHide]="false"
              [filter]="true"
              appendTo="body"
              [hideTransitionOptions]="'0ms'"
              [showTransitionOptions]="'0ms'"
              filter="false">
              <ng-template let-item pTemplate="selectedItem">
                <span>{{ item.label }}</span>
              </ng-template>
            </p-dropdown>
          </div>

          <!-- Botón Generar Reporte -->
          <div class="flex items-end justify-end gap-2 md:col-span-3">
            <button
              pButton
              type="button"
              icon="pi pi-file-excel"
              label="Generar Reporte"
              iconPos="left"
              (click)="generarReporte()"
              class="px-4 py-2.5 text-sm font-medium text-white bg-gray-700 hover:bg-gray-600 rounded-md shadow-sm transition-all duration-150">
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<p-toast></p-toast>
