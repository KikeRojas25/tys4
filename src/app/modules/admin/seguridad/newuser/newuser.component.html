<div class="flex flex-col flex-auto min-w-0 p-8 bg-card sm:py-10 sm:px-12">
  <!-- Encabezado -->
  <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between border-b bg-card dark:bg-transparent">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center font-medium">
        <a class="whitespace-nowrap text-primary-500">TMS</a>
        <div class="flex items-center ml-2 whitespace-nowrap">
          <mat-icon class="fuse-horizontal-navigation-item-icon" [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
          <a class="ml-2 subtitulo" [routerLink]="['/seguridad/listausuarios']">Gestión de Usuarios</a>
        </div>
        <div class="flex items-center ml-2 whitespace-nowrap">
          <mat-icon class="fuse-horizontal-navigation-item-icon" [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
          <span class="ml-2 subtitulo">Nuevo Usuario</span>
        </div>
      </div>
      <div class="mt-4">
        <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate">
          Nuevo Usuario
        </h2>
      </div>
    </div>
  </div>

  <!-- Formulario -->
  <div class="bg-card p-6 mt-6 ml-6 mr-6">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Usuario de red -->
        <div class="field flex flex-col gap-1">
          <label for="username" class="text-sm font-medium text-gray-700">Usuario de red <span class="text-red-500">*</span></label>
          <input id="username" pInputText formControlName="username" maxlength="12" placeholder="Ej: jperez" class="w-full" />
          <p-message *ngIf="userForm.get('username').invalid && userForm.get('username').touched"
                     severity="error" text="El usuario es requerido (máx. 12 caracteres)"></p-message>
        </div>

        <!-- Email -->
        <div class="field flex flex-col gap-1">
          <label for="email" class="text-sm font-medium text-gray-700">Email <span class="text-red-500">*</span></label>
          <input id="email" pInputText formControlName="email" type="email" placeholder="ejemplo@empresa.com" class="w-full" />
          <p-message *ngIf="userForm.get('email').invalid && userForm.get('email').touched"
                     severity="error" text="Ingrese un email válido"></p-message>
        </div>

        <!-- Nombres -->
        <div class="field flex flex-col gap-1">
          <label for="nombres" class="text-sm font-medium text-gray-700">Nombres <span class="text-red-500">*</span></label>
          <input id="nombres" pInputText formControlName="nombres" maxlength="50" placeholder="Nombres" class="w-full" />
          <p-message *ngIf="userForm.get('nombres').invalid && userForm.get('nombres').touched"
                     severity="error" text="Los nombres son requeridos"></p-message>
        </div>

        <!-- Apellidos -->
        <div class="field flex flex-col gap-1">
          <label for="apellidos" class="text-sm font-medium text-gray-700">Apellidos <span class="text-red-500">*</span></label>
          <input id="apellidos" pInputText formControlName="apellidos" maxlength="50" placeholder="Apellidos" class="w-full" />
          <p-message *ngIf="userForm.get('apellidos').invalid && userForm.get('apellidos').touched"
                     severity="error" text="Los apellidos son requeridos"></p-message>
        </div>

        <!-- Contraseña -->
        <div class="field flex flex-col gap-1">
          <label for="password" class="text-sm font-medium text-gray-700">Contraseña <span class="text-red-500">*</span></label>
          <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="false" placeholder="Mínimo 6 caracteres" styleClass="w-full" />
          <p-message *ngIf="userForm.get('password').invalid && userForm.get('password').touched"
                     severity="error" text="La contraseña debe tener al menos 6 caracteres"></p-message>
        </div>

        <!-- Clientes -->
        <div class="field flex flex-col gap-1">
          <label for="clientesIds" class="text-sm font-medium text-gray-700">Clientes vinculados</label>
          <p-multiSelect
            id="clientesIds"
            [options]="listClientes"
            formControlName="clientesIds"
            optionLabel="label"
            optionValue="value"
            appendTo="body"
            [filter]="true"
            placeholder="Seleccione clientes (opcional)"
            styleClass="w-full">
          </p-multiSelect>
        </div>

      </div>

      <!-- Botones -->
      <div class="flex gap-3 mt-8">
        <p-button type="submit" label="Guardar" icon="pi pi-check" [disabled]="guardando"></p-button>
        <p-button type="button" label="Cancelar" icon="pi pi-times" severity="secondary" (click)="onCancel()"></p-button>
      </div>
    </form>
  </div>
</div>

<p-confirmDialog />
<p-toast />
