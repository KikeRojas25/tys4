<div class="flex flex-col flex-auto min-w-0 bg-gray-50">

  <!-- Header -->
  <div class="flex items-center justify-between px-8 py-5 border-b border-gray-200 bg-white">
    <div>
      <div class="flex items-center gap-1 text-xs text-gray-400 mb-1">
        <span>{{ seccion }}</span>
        <mat-icon class="text-gray-300" style="font-size:14px;width:14px;height:14px" [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
        <span class="text-gray-600 font-medium">{{ titulo }}</span>
      </div>
      <h2 class="text-xl font-semibold text-gray-800 leading-tight">{{ titulo }}</h2>
    </div>
  </div>

  <p-toast />

  <div class="p-4 flex flex-col gap-3">

    <!-- Barra de control unificada -->
    <div class="bg-white rounded-lg border border-gray-200 shadow-sm px-4 py-3 flex flex-wrap items-center gap-3">

      <!-- Dropdown cliente (solo comercial) -->
      <div *ngIf="isComercial" class="flex-shrink-0 min-w-[260px]">
        <p-dropdown
          [options]="clientes"
          [(ngModel)]="idClienteSeleccionado"
          (ngModelChange)="onClienteChange($event)"
          placeholder="Seleccione cliente..."
          optionLabel="label"
          optionValue="value"
          [filter]="true"
          [showClear]="true"
          [style]="{'width':'100%'}"
          appendTo="body">
        </p-dropdown>
      </div>

      <!-- Separador vertical -->
      <div *ngIf="isComercial && idClienteSeleccionado" class="lt-sep"></div>

      <!-- Buscador -->
      <div class="lt-search flex-1 min-w-[200px]"
           *ngIf="!isComercial || idClienteSeleccionado">
        <i class="pi pi-search lt-search-icon"></i>
        <input
          type="text"
          [(ngModel)]="filtro"
          placeholder="Buscar departamento o provincia..."
          class="lt-search-input" />
        <button *ngIf="filtro" (click)="filtro=''" class="lt-search-clear">
          <i class="pi pi-times"></i>
        </button>
      </div>

      <!-- Checkbox solo vacíos -->
      <label class="lt-check-label" *ngIf="!isComercial || idClienteSeleccionado">
        <input type="checkbox" [(ngModel)]="soloVacios" class="lt-check" />
        <span>Sin asignar</span>
      </label>

      <!-- Contador -->
      <span class="lt-counter" *ngIf="!isComercial || idClienteSeleccionado">
        <span class="font-semibold text-gray-700">{{ totalFiltradas }}</span>
        <span class="text-gray-400 ml-1">{{ filtro ? 'resultados' : 'provincias' }}</span>
      </span>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Botón guardar -->
      <button
        *ngIf="!isComercial || idClienteSeleccionado"
        (click)="guardar()"
        [disabled]="saving"
        class="lt-btn-save">
        <i class="pi" [ngClass]="saving ? 'pi-spin pi-spinner' : 'pi-check'"></i>
        <span>{{ saving ? 'Guardando...' : 'Guardar' }}</span>
      </button>
    </div>

    <!-- Tabla -->
    <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden"
         *ngIf="!isComercial || idClienteSeleccionado">

      <div class="overflow-x-auto">
        <table class="lt-table w-full">
          <thead>
            <tr>
              <th class="lt-th lt-th-dept">Departamento</th>
              <th class="lt-th lt-th-prov">Provincia</th>
              <th class="lt-th lt-th-dia" *ngFor="let d of dias">{{ d }}</th>
            </tr>
          </thead>

          <!-- Loading -->
          <tbody *ngIf="loading">
            <tr>
              <td [attr.colspan]="2 + dias.length" class="text-center py-10 text-gray-400 text-sm">
                <i class="pi pi-spin pi-spinner mr-2"></i> Cargando...
              </td>
            </tr>
          </tbody>

          <!-- Datos -->
          <tbody *ngIf="!loading">
            <ng-container *ngFor="let tr of tableRows">
              <tr class="lt-tr">

                <!-- Departamento con rowspan -->
                <td *ngIf="tr.isFirstInGroup"
                    [attr.rowspan]="tr.rowspan"
                    class="lt-td lt-td-dept">
                  <span class="lt-dept-label">{{ tr.row.departamento }}</span>
                </td>

                <!-- Provincia -->
                <td class="lt-td lt-td-prov">
                  <span class="lt-prov-text" [innerHTML]="highlight(tr.row.provincia)"></span>
                </td>

                <!-- Días -->
                <td *ngFor="let d of dias"
                    (click)="seleccionarDia(tr.row, d)"
                    class="lt-td lt-td-dia"
                    [class.lt-dia-activo]="tr.row.dias === d"
                    [class.lt-dia-vacio]="tr.row.dias !== d">
                  <span class="lt-dia-badge">{{ d }}</span>
                </td>
              </tr>
            </ng-container>

            <!-- Sin resultados de búsqueda -->
            <tr *ngIf="tableRows.length === 0 && filtro">
              <td [attr.colspan]="2 + dias.length" class="text-center py-8 text-gray-400 text-sm">
                <i class="pi pi-search mr-2"></i>Sin resultados para "<strong>{{ filtro }}</strong>"
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Empty state: sin cliente -->
    <div *ngIf="isComercial && !idClienteSeleccionado"
         class="bg-white rounded-lg border border-dashed border-gray-300 p-12 text-center text-gray-400">
      <i class="pi pi-users" style="font-size:2rem"></i>
      <p class="mt-3 text-sm">Seleccione un cliente para configurar sus tiempos de entrega</p>
    </div>

  </div>
</div>
