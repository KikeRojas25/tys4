<div class="flex flex-col flex-auto min-w-0 bg-gray-50">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-2 sm:py-8 sm:px-10 border-b border-gray-200 bg-white shadow-sm">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center font-medium text-sm text-gray-600">
        <div>
          <a class="whitespace-nowrap text-gray-700 hover:text-gray-900">TMS</a>
        </div>
        <div class="flex items-center ml-1 whitespace-nowrap">
          <mat-icon class="fuse-horizontal-navigation-item-icon text-gray-400" [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
          <a class="ml-1 text-gray-700 hover:text-gray-900">Mantenimiento</a>
        </div>
      </div>
      <div class="mt-2">
        <h2 class="text-3xl md:text-4xl font-semibold tracking-tight leading-7 sm:leading-10 truncate text-gray-900">Vehículos</h2>
        <p class="text-sm text-amber-700 mt-1.5">Gestión de vehículos</p>
      </div>
    </div>
  </div>

  <p-toast />
  <p-confirmDialog />

  <div class="main-content container-fluid p-2">
    <!-- Filtros -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-2 overflow-hidden">
      <div class="p-2">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-2">
          <div class="flex flex-col lg:col-span-2">
            <label class="mb-1">Placa:</label>
            <input pInputText [(ngModel)]="model.placa" [style]="{'width':'100%'}" placeholder="Ingrese placa" (keyup.enter)="buscar()" />
          </div>

          <div class="flex flex-col lg:col-span-3">
            <label class="mb-1">Proveedor (Transportista):</label>
            <p-dropdown
              [options]="proveedores"
              [(ngModel)]="model.idProveedor"
              placeholder="Seleccione proveedor"
              appendTo="body"
              [virtualScroll]="true"
              [filter]="true"
              class="w-full"
              [virtualScrollItemSize]="30"
              [showClear]="true"
              [loading]="cargandoProveedores">
              <ng-template let-item pTemplate="selectedItem">
                <span>{{ item.label }}</span>
              </ng-template>
            </p-dropdown>
          </div>

          <div class="flex flex-col mt-4">
            <button
              class="px-4 py-2.5 text-sm font-medium text-white bg-gray-700 hover:bg-gray-600 rounded-md shadow-sm transition-all duration-150"
              pButton
              label="Buscar"
              icon="pi pi-search"
              iconPos="left"
              (click)="buscar()">
            </button>
          </div>

          <div class="flex flex-col mt-4">
            <button
              class="px-4 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 rounded-md shadow-sm transition-all duration-150"
              pButton
              label="Nuevo"
              icon="pi pi-plus"
              iconPos="left"
              (click)="nuevo()">
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
      <div class="p-6">
        <p-table
          class="w-full"
          [value]="vehiculos"
          [paginator]="true"
          [rows]="20"
          [rowsPerPageOptions]="[20,40,60,120]"
          [resizableColumns]="true"
          [scrollable]="true"
          scrollHeight="75vh"
          [loading]="loading"
          [styleClass]="'custom-table'">

          <ng-template pTemplate="header">
            <tr class="bg-gray-800 text-white">
              <th class="text-center px-4 py-3 text-sm font-semibold text-gray-100 border-b border-gray-700" style="width:140px;">ACC</th>
              <th class="text-center px-4 py-3 text-sm font-semibold text-gray-100 border-b border-gray-700" style="width:120px;">PLACA</th>
              <th class="text-center px-4 py-3 text-sm font-semibold text-gray-100 border-b border-gray-700" style="width:160px;">MARCA</th>
              <th class="text-center px-4 py-3 text-sm font-semibold text-gray-100 border-b border-gray-700" style="width:200px;">TIPO</th>
              <th class="text-center px-4 py-3 text-sm font-semibold text-gray-100 border-b border-gray-700" style="width:140px;">CARGA ÚTIL</th>
              <th class="text-center px-4 py-3 text-sm font-semibold text-gray-100 border-b border-gray-700" style="width:140px;">PESO BRUTO</th>
              <th class="text-center px-4 py-3 text-sm font-semibold text-gray-100 border-b border-gray-700" style="width:240px;">PROVEEDOR</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-vehiculo>
            <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors duration-150">
              <td class="text-center px-2 py-2">
                <div class="flex gap-1 justify-center items-center">
                  <button pButton class="action-btn action-btn-primary" icon="pi pi-pencil" title="Editar" (click)="editar(vehiculo.idVehiculo)"></button>
                  <button pButton class="action-btn action-btn-danger" icon="pi pi-trash" title="Eliminar" (click)="eliminar(vehiculo.idVehiculo)"></button>
                </div>
              </td>
              <td class="text-center px-4 py-3 text-gray-700 text-sm">{{ vehiculo.placa }}</td>
              <td class="text-center px-4 py-3 text-gray-700 text-sm">{{ vehiculo.marca }}</td>
              <td class="text-center px-4 py-3 text-gray-700 text-sm word-wrap">{{ vehiculo.tipoVehiculo }}</td>
              <td class="text-center px-4 py-3 text-gray-700 text-sm">{{ vehiculo.cargaUtil }}</td>
              <td class="text-center px-4 py-3 text-gray-700 text-sm">{{ vehiculo.pesoBruto }}</td>
              <td class="text-center px-4 py-3 text-gray-700 text-sm word-wrap">{{ vehiculo.proveedor }}</td>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="7" class="text-center p-4">
                <span class="text-gray-600">No hay vehículos para mostrar</span>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </div>
  </div>
</div>
