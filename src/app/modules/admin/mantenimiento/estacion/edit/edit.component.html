<div class="container mx-auto py-8 px-6 bg-white shadow-lg rounded-lg">

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <!-- Estación Origen -->
    <div class="field mb-5">
      <label for="estacionOrigen" class="block text-sm font-medium text-gray-700 mb-2">
        Estación Origen <span class="text-red-500">*</span>
      </label>
      <input
        formControlName="estacionOrigen"
        id="estacionOrigen"
        type="text"
        pInputText
        class="w-full p-inputtext-lg"
        placeholder="Ingrese el nombre de la estación origen"
      />
      <div *ngIf="form.get('estacionOrigen')?.invalid && form.get('estacionOrigen')?.touched" class="text-red-500 text-xs mt-1">
        <div *ngIf="form.get('estacionOrigen')?.errors?.required">Este campo es obligatorio.</div>
        <div *ngIf="form.get('estacionOrigen')?.errors?.minlength">Debe tener al menos 3 caracteres.</div>
        <div *ngIf="form.get('estacionOrigen')?.errors?.maxlength">Debe tener máximo 100 caracteres.</div>
      </div>
    </div>

    <!-- Distrito -->
    <div class="field mb-5">
      <label for="idDistrito" class="block text-sm font-medium text-gray-700 mb-2">
        Distrito <span class="text-red-500">*</span>
      </label>
      <p-dropdown
        formControlName="idDistrito"
        [options]="distritos"
        placeholder="Seleccione un distrito"
        [filter]="true"
        class="w-full"
        appendTo="body"
      >
        <ng-template let-item pTemplate="selectedItem">
          <span style="vertical-align:left;">{{item.label}}</span>
        </ng-template>
      </p-dropdown>
      <div *ngIf="form.get('idDistrito')?.invalid && form.get('idDistrito')?.touched" class="text-red-500 text-xs mt-1">
        <div *ngIf="form.get('idDistrito')?.errors?.required">Este campo es obligatorio.</div>
      </div>
    </div>

    <!-- Flujo Regular -->
    <div class="field mb-5">
      <div class="flex items-center">
        <p-checkbox
          formControlName="flujoRegular"
          inputId="flujoRegular"
          [binary]="true"
        ></p-checkbox>
        <label for="flujoRegular" class="ml-2 block text-sm font-medium text-gray-700">
          Flujo Regular
        </label>
      </div>
    </div>

    <!-- Botones -->
    <div class="flex justify-end space-x-4">
      <p-button
        type="submit"
        label="Guardar"
        class="p-button-rounded p-button-success p-button-lg"
        [disabled]="form.invalid"
        icon="pi pi-check"
      ></p-button>
      <p-button
        type="button"
        label="Cancelar"
        class="p-button-rounded p-button-secondary p-button-lg"
        icon="pi pi-times"
        (click)="onCancel()"
      ></p-button>
    </div>
  </form>
  
  <p-confirmDialog />
  <p-toast />
</div>
